<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {%- seo -%}
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    
    <script>
      // Apply saved theme and font scale immediately to prevent flash
      (function() {
        var theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
        var scales = { small: '0.875', medium: '1', large: '1.175' };
        var scale = localStorage.getItem('font-scale') || 'medium';
        document.documentElement.style.setProperty('--font-scale', scales[scale] || '1');
      })();
    </script>
    {% if page.chapter_num %}<meta name="chapter-num" content="{{ page.chapter_num }}">{% endif %}
    
    {%- feed_meta -%}
    {%- if jekyll.environment == 'production' and site.google_analytics -%}
      {%- include google-analytics.html -%}
    {%- endif -%}
  </head>
  <body>
    {%- include sidebar.html -%}
    {%- include header.html -%}

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
        {%- include chapter-nav.html -%}
      </div>
    </main>

    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  </body>
</html>
